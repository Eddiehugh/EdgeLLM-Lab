experiment:
  name: local-execution-smoke

runtime:
  device: cpu
  seed: 42

model:
  name: tiny_gpt
  vocab_size: 256
  hidden_size: 32
  num_layers: 2
  num_heads: 4
  max_position_embeddings: 16

data:
  tokenizer_type: char
  text: "EdgeLLM Lab local execution smoke test.\n"
  block_size: 16

loss:
  type: causal_lm

training:
  batch_size: 2
  learning_rate: 0.001
  max_steps: 2
  optimizer:
    type: adamw
  scheduler:
    type: constant

execution:
  executor:
    type: local
  runtime:
    type: native
  artifact_store:
    type: local
    root: artifacts/jobs
