# Update the private profile when AutoDL assigns a different SSH endpoint:
# edgellm connection set autodl-main --ssh-command "ssh -p PORT root@HOST"
experiment:
  name: autodl-tiny-gpt
runtime: {device: cuda, seed: 42}
model:
  name: tiny_gpt
  vocab_size: 256
  hidden_size: 128
  num_layers: 4
  num_heads: 4
  max_position_embeddings: 128
data: {tokenizer_type: char, text: "EdgeLLM Lab AutoDL experiment repeated for a valid batch. EdgeLLM Lab.\n", block_size: 16}
loss: {type: causal_lm}
training:
  batch_size: 4
  learning_rate: 0.0003
  max_steps: 100
  optimizer: {type: adamw}
  scheduler: {type: constant}

execution:
  executor:
    type: autodl
    profile: autodl-main
    remote_root: /root/autodl-tmp/edgellm-jobs
  runtime:
    type: native
    python: python3
  artifact_store:
    type: local
    # Hot export directory. Upload completed job directories to Quark with
    # AutoPanel. If AutoDL File Storage is enabled, prefer:
    # /root/autodl-fs/EdgeLLM-Lab/artifacts
    root: /root/autodl-tmp/edgellm-artifacts
  source:
    require_clean: true
