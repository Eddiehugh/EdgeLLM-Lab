# First end-to-end acceptance run for an AutoDL RTX 4090-class instance.
# The local checkout stays independent under external_projects/nanochat.
experiment:
  name: nanochat-autodl-smoke

execution:
  executor:
    type: autodl
    profile: autodl-main
    remote_root: /root/autodl-tmp/edgellm-jobs
    shell_init:
      - source /etc/network_turbo
  runtime:
    type: native
    # AutoDL exposes Conda through interactive shell initialization; remote jobs
    # use an absolute path so non-interactive SSH execution is deterministic.
    python: /root/miniconda3/bin/python
  artifact_store:
    type: local
    # Prefer /root/autodl-fs/EdgeLLM-Lab/artifacts when AutoDL File Storage is mounted.
    root: /root/autodl-tmp/edgellm-artifacts
  source:
    # Pins the EdgeLLM-Lab control-plane revision.
    require_clean: true
  env:
    # The prepared AutoDL instance already stores nanochat data and tokenizer here.
    NANOCHAT_BASE_DIR: /root/autodl-tmp/nanochat
    PYTHONUNBUFFERED: "1"
  workload:
    type: external_project
    integration: nanochat
    source:
      # repo_url and revision are derived from this independent local Git checkout.
      local_path: external_projects/nanochat
      require_clean: true
    working_directory: .
    command:
      - /root/miniconda3/bin/python
      - -m
      - scripts.base_train
      - --depth=4
      - --head-dim=64
      - --window-pattern=L
      - --max-seq-len=512
      - --device-batch-size=4
      - --total-batch-size=2048
      - --eval-every=-1
      - --eval-tokens=512
      - --core-metric-every=-1
      - --sample-every=-1
      - --save-every=-1
      - --num-iterations=20
      - --model-tag=edgellm-smoke
      - --run=dummy
    artifacts:
      - ${NANOCHAT_BASE_DIR}/base_checkpoints/edgellm-smoke
